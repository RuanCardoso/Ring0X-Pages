<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Aprovado - Ring0X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.6); }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%); }
        .success-gradient { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-xl w-full">
            <div class="bg-neutral-900/90 backdrop-blur-xl rounded-3xl border border-white/5 shadow-2xl p-8 md:p-10 text-center">
                
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full success-gradient pulse-glow mb-6">
                    <i class="fas fa-check text-3xl text-white"></i>
                </div>

                <h1 class="text-3xl md:text-4xl font-bold mb-2">Acesso <span class="text-green-500">Liberado!</span></h1>
                <p class="text-neutral-400 mb-8 text-sm md:text-base">
                    Sua transação foi concluída com sucesso. O conteúdo já está disponível.
                </p>

                <div class="bg-black/40 rounded-2xl p-5 mb-8 text-left border border-white/5">
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-neutral-500">ID da Transação:</span>
                            <span class="font-mono text-green-500" id="orderID">Carregando...</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-neutral-500">Data de Ativação:</span>
                            <span id="curDate"></span>
                        </div>
                        <div class="flex justify-between border-t border-white/10 pt-2 mt-2">
                            <span class="text-neutral-500">Plataforma:</span>
                            <span class="text-white">GuaraniHub / Ring0X</span>
                        </div>
                    </div>
                </div>

                <a href="https://ring0x.guaranihub.com/" class="block w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-green-900/20 mb-4">
                    <i class="fas fa-terminal mr-2"></i> IR PARA ÁREA DO ALUNO
                </a>
            </div>
        </div>
    </div>

    <script>
        // Captura o parâmetro 'id' da URL (ex: ?id=CH_12345)
        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get('id');
        
        // Exibe o ID se existir, caso contrário gera um placeholder
        document.getElementById('orderID').textContent = transactionId ? transactionId.toUpperCase() : 'PENDENTE';
        
        // Data atual
        document.getElementById('curDate').textContent = new Date().toLocaleDateString('pt-BR');
    </script>
</body>
</html>
