<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site em Manutenção - Ring0X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }
        .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .gradient-bg { background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%); }
        .maintenance-gradient { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-xl w-full">
            <div class="bg-neutral-900/90 backdrop-blur-xl rounded-3xl border border-white/5 shadow-2xl p-8 md:p-10 text-center">
                
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full maintenance-gradient pulse-glow mb-6">
                    <i class="fas fa-tools text-3xl text-white"></i>
                </div>

                <h1 class="text-3xl md:text-4xl font-bold mb-2">Site em <span class="text-red-500">Manutenção</span></h1>
                <p class="text-neutral-400 mb-8 text-sm md:text-base">
                    Estamos trabalhando para melhorar sua experiência. Voltaremos em breve!
                </p>

                <div class="bg-black/40 rounded-2xl p-5 mb-8 text-left border border-white/5">
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-neutral-500">Status:</span>
                            <span class="font-mono text-red-500">Em manutenção</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-neutral-500">Início:</span>
                            <span id="startDate"></span>
                        </div>
                        <div class="flex justify-between border-t border-white/10 pt-2 mt-2">
                            <span class="text-neutral-500">Plataforma:</span>
                            <span class="text-white">Ring0X / GuaraniHub</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data de início da manutenção
        document.getElementById('startDate').textContent = new Date().toLocaleDateString('pt-BR');
    </script>
</body>
</html>
