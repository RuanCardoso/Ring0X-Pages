<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status da Transação - Ring0X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%); }
        .error-gradient { background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%); }
        .amber-gradient { background: linear-gradient(135deg, #d97706 0%, #92400e 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white font-sans">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-xl w-full">
            <div class="bg-neutral-900/90 backdrop-blur-xl rounded-3xl border border-white/5 shadow-2xl p-8 md:p-10 text-center">
                
                <div id="iconContainer" class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-6">
                    <i id="mainIcon" class="fas fa-times text-3xl text-white"></i>
                </div>

                <h1 id="statusTitle" class="text-3xl md:text-4xl font-bold mb-2">Pagamento não concluído</h1>
                <p id="statusDesc" class="text-neutral-400 mb-8 text-sm md:text-base">A transação não foi finalizada.</p>

                <div class="bg-black/40 rounded-2xl p-5 mb-6 text-left border border-white/5">
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-neutral-500">Motivo:</span>
                            <span id="errorReason" class="text-white font-medium">Interrompido</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-neutral-500">Referência:</span>
                            <span class="font-mono text-neutral-400" id="refID"></span>
                        </div>
                    </div>
                </div>

                <p class="text-xs text-neutral-600">
                    Se você acredita que isso foi um erro, verifique os dados com sua instituição financeira.
                </p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const id = urlParams.get('id');

        if (type === 'cancel') {
            document.getElementById('statusTitle').innerText = "Pagamento Cancelado";
            document.getElementById('statusTitle').classList.add('text-amber-500');
            document.getElementById('statusDesc').innerText = "A operação foi cancelada antes da conclusão.";
            document.getElementById('errorReason').innerText = "Cancelado pelo usuário";
            document.getElementById('mainIcon').className = "fas fa-exclamation text-3xl text-white";
            document.getElementById('iconContainer').classList.add('amber-gradient');
        } else {
            document.getElementById('statusTitle').classList.add('text-red-500');
            document.getElementById('iconContainer').classList.add('error-gradient');
        }

        document.getElementById('refID').textContent = id ? id.toUpperCase() : 'ERR-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    </script>
</body>
</html>
